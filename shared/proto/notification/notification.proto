syntax = "proto3";
package notification;
option go_package = "github.com/ecocomply/shared/proto/notification";

service NotificationService {
  rpc Send(SendRequest) returns (SendResponse);
}

message SendRequest {
  string recipient_id = 1;
  string type = 2;
  string subject = 3;
  string body = 4;
}
message SendResponse { bool sent = 1; }
